name: Java CI with Maven

on:
  push:
    branches: [ "main", "Part-3-Dev-Branch", "Part-2-Dev-Branch" ]
  pull_request:
    branches: [ "main", "Part-3-Dev-Branch", "Part-2-Dev-Branch" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for tagging logic to see history

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4

      # --- TAGGING LOGIC ---

      - name: Auto-tag Main (Minor)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: minor
          WITH_V: true

      # This block handles the patch bump for dev (v0.0.x)
      - name: Auto-tag Dev (Patch)
        if: |
          github.event_name == 'workflow_dispatch' || 
          (github.event_name == 'push' && contains(github.ref, 'Dev-Branch'))
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
